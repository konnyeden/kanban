version: '3.9'
services:
  db:
    image: postgres:15
    container_name: kanban_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kanban
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  server:
    build:
      context:
    container_name: kanban_server
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/kanban
    ports:
      - "8000:8000"
volumes:
  postgres_data:
